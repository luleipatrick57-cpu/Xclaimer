<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclaimer Bot Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Xclaimer Bot Pro</h1>

<input type="password" id="token" placeholder="Enter Deriv API Token">

<select id="market">
<option>R_10</option>
<option>R_25</option>
<option>R_50</option>
<option>R_75</option>
<option>R_100</option>
</select>

<input type="number" id="stake" value="0.35" step="0.01" min="0.01">

<input type="number" id="tp" value="20" step="1" min="1">

<input type="number" id="sl" value="15" step="1" min="1">

<button id="connect">Connect</button>

<button id="start">Start</button>

<button id="stop">Stop</button>

<h2 id="balance">Balance: --</h2>

<h2 id="signal">Signal: WAIT</h2>

<h2 id="profit">Profit: $0.00</h2>

<div id="log"></div>

</div>

<script src="app.js"></script>

</body>
</html>
