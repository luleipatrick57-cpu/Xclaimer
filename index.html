<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xclaimer Bot Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🤖 Xclaimer Bot Pro</h1>

<input type="password" id="token" placeholder="Enter Deriv API Token">

<label style="color: #666; font-size: 0.9em; margin-top: 10px; display: block;">Market Selection:</label>
<select id="market">
<option value="R_10">R_10 - 10 Second</option>
<option value="R_25">R_25 - 25 Second</option>
<option value="R_50">R_50 - 50 Second</option>
<option value="R_75">R_75 - 75 Second</option>
<option value="R_100">R_100 - 100 Second</option>
</select>

<div class="input-group">
    <div>
        <label style="color: #666; font-size: 0.9em; display: block; margin-bottom: 5px;">Stake ($)</label>
        <input type="number" id="stake" value="0.35" min="0.01" step="0.01">
    </div>
    <div>
        <label style="color: #666; font-size: 0.9em; display: block; margin-bottom: 5px;">Take Profit ($)</label>
        <input type="number" id="tp" value="20" min="1" step="1">
    </div>
</div>

<div class="input-group">
    <div>
        <label style="color: #666; font-size: 0.9em; display: block; margin-bottom: 5px;">Stop Loss ($)</label>
        <input type="number" id="sl" value="15" min="1" step="1">
    </div>
</div>

<div class="button-group">
    <button id="connect">🔗 Connect</button>
    <button id="start">▶ Start</button>
    <button id="stop">⏹ Stop</button>
</div>

<h2 id="balance">💰 Balance: --</h2>

<h2 id="signal">📊 Signal: WAIT</h2>

<h2 id="profit">📈 Profit: $0.00</h2>

<h3 style="color: #667eea; margin: 20px 0 10px 0; font-size: 1em;">📋 Trade Log:</h3>
<div id="log"></div>

</div>

<script src="app.js"></script>

</body>
</html>
